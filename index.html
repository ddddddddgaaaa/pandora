<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ЯЩИК ПАНДОРЫ</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --purple-deep: #1a0a2e;
    --purple-mid: #2d1557;
    --purple-bright: #7c3aed;
    --purple-glow: #a855f7;
    --purple-light: #c084fc;
    --purple-pale: #e9d5ff;
    --gold: #f59e0b;
    --white: #ffffff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--purple-deep);
    font-family: 'Inter', sans-serif;
    overflow-x: hidden;
    min-height: 100vh;
  }

  /* Animated background */
  .bg-orbs {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
  }
  .orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.3;
    animation: floatOrb 8s ease-in-out infinite;
  }
  .orb1 { width: 400px; height: 400px; background: var(--purple-bright); top: -100px; left: -100px; animation-delay: 0s; }
  .orb2 { width: 300px; height: 300px; background: var(--purple-glow); bottom: -50px; right: -50px; animation-delay: -3s; }
  .orb3 { width: 200px; height: 200px; background: #9333ea; top: 50%; left: 50%; transform: translate(-50%,-50%); animation-delay: -5s; }

  @keyframes floatOrb {
    0%, 100% { transform: translate(0,0) scale(1); }
    33% { transform: translate(30px, -20px) scale(1.05); }
    66% { transform: translate(-20px, 15px) scale(0.95); }
  }

  .container { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; padding: 40px 20px; }

  /* Header */
  .header { text-align: center; margin-bottom: 60px; }
  .badge {
    display: inline-block;
    background: linear-gradient(135deg, var(--purple-bright), var(--purple-glow));
    color: white;
    font-family: 'Unbounded', sans-serif;
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    padding: 8px 20px;
    border-radius: 100px;
    margin-bottom: 24px;
    box-shadow: 0 0 20px rgba(168,85,247,0.5);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 20px rgba(168,85,247,0.5); }
    50% { box-shadow: 0 0 40px rgba(168,85,247,0.9); }
  }

  h1 {
    font-family: 'Unbounded', sans-serif;
    font-size: clamp(36px, 8vw, 72px);
    font-weight: 900;
    color: var(--white);
    line-height: 1.05;
    margin-bottom: 16px;
  }
  h1 span {
    background: linear-gradient(135deg, var(--purple-light), var(--purple-glow), var(--gold));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    color: var(--purple-pale);
    font-size: 16px;
    font-weight: 300;
    opacity: 0.7;
  }

  /* Boxes Grid */
  .boxes-section { margin-bottom: 60px; }
  .boxes-label {
    font-family: 'Unbounded', sans-serif;
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--purple-light);
    text-align: center;
    margin-bottom: 30px;
    opacity: 0.6;
  }

  .boxes-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 12px;
    margin-bottom: 12px;
  }

  .box {
    aspect-ratio: 1;
    border-radius: 16px;
    background: linear-gradient(145deg, var(--purple-mid), #1e0b3a);
    border: 1.5px solid rgba(168,85,247,0.2);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column;
    gap: 6px;
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    position: relative;
    overflow: hidden;
  }
  .box::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(168,85,247,0.15), transparent);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .box:hover { transform: translateY(-4px) scale(1.03); border-color: var(--purple-glow); box-shadow: 0 8px 30px rgba(168,85,247,0.4); }
  .box:hover::before { opacity: 1; }
  .box:hover .box-icon { transform: scale(1.1) rotate(-5deg); }
  .box.selected {
    background: linear-gradient(145deg, var(--purple-bright), #5b21b6);
    border-color: var(--purple-glow);
    box-shadow: 0 0 30px rgba(168,85,247,0.6), inset 0 0 20px rgba(255,255,255,0.05);
    transform: translateY(-4px) scale(1.05);
    animation: selectedPulse 1.5s ease-in-out infinite;
  }
  @keyframes selectedPulse {
    0%, 100% { box-shadow: 0 0 30px rgba(168,85,247,0.6), inset 0 0 20px rgba(255,255,255,0.05); }
    50% { box-shadow: 0 0 50px rgba(168,85,247,0.9), inset 0 0 20px rgba(255,255,255,0.1); }
  }
  .box.opened {
    cursor: default;
    transform: none !important;
  }
  .box.opened .box-icon { display: none; }

  .box-icon { font-size: 28px; transition: transform 0.3s; }
  .box-num {
    font-family: 'Unbounded', sans-serif;
    font-size: 9px;
    color: rgba(255,255,255,0.3);
    letter-spacing: 1px;
  }
  .box.selected .box-num { color: rgba(255,255,255,0.7); }

  /* Prize reveal inside box */
  .prize-inside {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    width: 100%; height: 100%;
    padding: 8px;
  }
  .box.opened .prize-inside { display: flex; }
  .prize-img-wrap {
    width: 50px; height: 50px;
    border-radius: 10px;
    overflow: hidden;
    background: rgba(255,255,255,0.1);
    display: flex; align-items: center; justify-content: center;
    font-size: 24px;
  }
  .prize-img-wrap img { width: 100%; height: 100%; object-fit: cover; border-radius: 10px; }
  .prize-name-small {
    font-family: 'Unbounded', sans-serif;
    font-size: 7px;
    color: white;
    text-align: center;
    line-height: 1.3;
    word-break: break-word;
  }

  /* Prize Editor */
  .prizes-section {
    background: linear-gradient(145deg, var(--purple-mid), #1e0b3a);
    border: 1.5px solid rgba(168,85,247,0.2);
    border-radius: 24px;
    padding: 32px;
    margin-bottom: 40px;
  }
  .section-title {
    font-family: 'Unbounded', sans-serif;
    font-size: 14px;
    color: white;
    margin-bottom: 6px;
  }
  .section-sub {
    font-size: 13px;
    color: var(--purple-pale);
    opacity: 0.5;
    margin-bottom: 28px;
  }

  .prizes-list { display: flex; flex-direction: column; gap: 12px; }

  .prize-row {
    display: grid;
    grid-template-columns: 36px 1fr auto auto;
    gap: 10px;
    align-items: center;
  }
  .prize-num-badge {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--purple-bright), var(--purple-glow));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Unbounded', sans-serif;
    font-size: 11px;
    color: white;
    font-weight: 700;
    flex-shrink: 0;
  }

  .prize-input {
    background: rgba(255,255,255,0.05);
    border: 1.5px solid rgba(168,85,247,0.2);
    border-radius: 12px;
    padding: 10px 14px;
    color: white;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    width: 100%;
    transition: border-color 0.2s, background 0.2s;
    outline: none;
  }
  .prize-input:focus { border-color: var(--purple-glow); background: rgba(168,85,247,0.08); }
  .prize-input::placeholder { color: rgba(255,255,255,0.2); }

  .img-btn {
    width: 36px; height: 36px;
    border-radius: 10px;
    border: 1.5px dashed rgba(168,85,247,0.4);
    background: transparent;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--purple-light);
    font-size: 16px;
    transition: all 0.2s;
    position: relative;
    flex-shrink: 0;
  }
  .img-btn:hover { border-color: var(--purple-glow); background: rgba(168,85,247,0.1); }
  .img-btn.has-img { border-style: solid; border-color: var(--purple-glow); }
  .img-btn img { width: 100%; height: 100%; object-fit: cover; border-radius: 8px; position: absolute; inset: 0; }
  .img-btn input[type=file] { display: none; }

  .del-btn {
    width: 36px; height: 36px;
    border-radius: 10px;
    border: 1.5px solid rgba(255,100,100,0.2);
    background: transparent;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: rgba(255,100,100,0.5);
    font-size: 16px;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .del-btn:hover { border-color: rgba(255,100,100,0.6); color: rgba(255,100,100,0.9); background: rgba(255,100,100,0.08); }

  .add-prize-btn {
    width: 100%;
    padding: 12px;
    border-radius: 12px;
    border: 1.5px dashed rgba(168,85,247,0.3);
    background: transparent;
    color: var(--purple-light);
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    cursor: pointer;
    margin-top: 8px;
    transition: all 0.2s;
  }
  .add-prize-btn:hover { border-color: var(--purple-glow); background: rgba(168,85,247,0.08); }

  /* Action button */
  .spin-btn {
    display: block;
    width: 100%;
    padding: 20px;
    border-radius: 18px;
    border: none;
    background: linear-gradient(135deg, var(--purple-bright), #9333ea, var(--purple-glow));
    color: white;
    font-family: 'Unbounded', sans-serif;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    box-shadow: 0 8px 30px rgba(124,58,237,0.5);
    margin-bottom: 40px;
    text-transform: uppercase;
    position: relative;
    overflow: hidden;
  }
  .spin-btn::before {
    content: '';
    position: absolute;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: linear-gradient(45deg, transparent 30%, rgba(255,255,255,0.1) 50%, transparent 70%);
    transform: rotate(45deg) translateX(-100%);
    transition: transform 0.5s;
  }
  .spin-btn:hover { transform: translateY(-2px) scale(1.01); box-shadow: 0 12px 40px rgba(124,58,237,0.7); }
  .spin-btn:hover::before { transform: rotate(45deg) translateX(100%); }
  .spin-btn:active { transform: scale(0.98); }
  .spin-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* Result Modal */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(10,0,20,0.85);
    backdrop-filter: blur(8px);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s;
  }
  .modal-overlay.show { opacity: 1; pointer-events: all; }

  .modal {
    background: linear-gradient(145deg, var(--purple-mid), #1a0940);
    border: 1.5px solid rgba(168,85,247,0.4);
    border-radius: 28px;
    padding: 48px 40px;
    max-width: 400px;
    width: 90%;
    text-align: center;
    transform: scale(0.8) translateY(20px);
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    box-shadow: 0 30px 80px rgba(0,0,0,0.5), 0 0 60px rgba(168,85,247,0.3);
    position: relative;
    overflow: hidden;
  }
  .modal-overlay.show .modal { transform: scale(1) translateY(0); }

  .modal::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent, var(--purple-glow), var(--purple-light), transparent);
  }

  .modal-emoji { font-size: 64px; margin-bottom: 16px; display: block; animation: bounceIn 0.5s 0.2s both; }
  @keyframes bounceIn {
    0% { transform: scale(0); opacity: 0; }
    70% { transform: scale(1.2); }
    100% { transform: scale(1); opacity: 1; }
  }

  .modal-prize-img {
    width: 100px; height: 100px;
    border-radius: 20px;
    object-fit: cover;
    margin: 0 auto 16px;
    display: block;
    border: 2px solid rgba(168,85,247,0.5);
    animation: bounceIn 0.5s 0.2s both;
  }

  .modal-label {
    font-family: 'Unbounded', sans-serif;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--purple-light);
    opacity: 0.6;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .modal-prize-name {
    font-family: 'Unbounded', sans-serif;
    font-size: 24px;
    font-weight: 900;
    color: white;
    margin-bottom: 24px;
    line-height: 1.2;
  }
  .modal-box-num {
    font-size: 13px;
    color: var(--purple-pale);
    opacity: 0.5;
    margin-bottom: 28px;
  }
  .modal-close {
    padding: 14px 40px;
    border-radius: 14px;
    border: none;
    background: linear-gradient(135deg, var(--purple-bright), var(--purple-glow));
    color: white;
    font-family: 'Unbounded', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .modal-close:hover { transform: scale(1.05); box-shadow: 0 8px 20px rgba(168,85,247,0.5); }

  /* Confetti */
  .confetti-piece {
    position: fixed;
    width: 8px; height: 8px;
    opacity: 0;
    pointer-events: none;
    z-index: 200;
    border-radius: 2px;
  }

  @media (max-width: 500px) {
    .boxes-grid { grid-template-columns: repeat(5, 1fr); gap: 8px; }
    .prize-row { grid-template-columns: 32px 1fr auto auto; gap: 8px; }
    h1 { font-size: 32px; }
  }
</style>
</head>
<body>

<div class="bg-orbs">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
</div>

<div class="container">
  <div class="header">
    <div class="badge">✨ Розыгрыш ОТ КЕШИ</div>
    <h1>ЯЩИК<br><span>ПАНДОРЫ</span></h1>
    <p class="subtitle">Выбери ящик и узнай свой приз</p>
  </div>

  <!-- Boxes -->
  <div class="boxes-section">
    <div class="boxes-label">Выбери один из 10 ящиков</div>
    <div class="boxes-grid" id="boxesGrid"></div>
  </div>

  <!-- Prize editor -->
  <div class="prizes-section">
    <div class="section-title">🎁 Призы</div>
    <div class="section-sub">Напиши названия скинов и добавляй фото</div>
    <div class="prizes-list" id="prizesList"></div>
    <button class="add-prize-btn" onclick="addPrize()">+ Добавить приз</button>
  </div>

  <button class="spin-btn" id="spinBtn" onclick="openSelectedBox()">🎲 Открыть ящик</button>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div id="modalVisual"></div>
    <div class="modal-label">Твой приз</div>
    <div class="modal-prize-name" id="modalPrizeName">—</div>
    <div class="modal-box-num" id="modalBoxNum"></div>
    <button class="modal-close" onclick="closeModal()">Отлично! 🎉</button>
  </div>
</div>

<script>
let prizes = [
  { name: 'Длор', img: null },
  { name: 'Вой', img: null },
  { name: 'Дилдо', img: null },
  { name: 'Бабочка', img: null },
  { name: 'Керыч', img: null },
  { name: 'Авп фейд', img: null },
  { name: 'Мка поток информации', img: null },
  { name: 'хз че добавить', img: null },
  { name: 'хз', img: null },
  { name: 'кеша топ', img: null },
];

let selectedBox = null;
let openedBoxes = new Set();

function renderBoxes() {
  const grid = document.getElementById('boxesGrid');
  grid.innerHTML = '';
  for (let i = 0; i < 10; i++) {
    const box = document.createElement('div');
    box.className = 'box' + (selectedBox === i ? ' selected' : '') + (openedBoxes.has(i) ? ' opened' : '');
    box.dataset.index = i;

    if (openedBoxes.has(i)) {
      const prize = prizes[i % prizes.length];
      box.innerHTML = `
        <div class="prize-inside">
          <div class="prize-img-wrap">
            ${prize.img ? `<img src="${prize.img}">` : '🎁'}
          </div>
          <div class="prize-name-small">${prize.name}</div>
        </div>`;
    } else {
      box.innerHTML = `
        <div class="box-icon">📦</div>
        <div class="box-num">#${i + 1}</div>`;
      box.onclick = () => selectBox(i);
    }

    grid.appendChild(box);
  }
}

function selectBox(i) {
  if (openedBoxes.has(i)) return;
  selectedBox = (selectedBox === i) ? null : i;
  document.getElementById('spinBtn').disabled = selectedBox === null;
  renderBoxes();
}

function openSelectedBox() {
  if (selectedBox === null) return;

  const prize = prizes[selectedBox % prizes.length];
  openedBoxes.add(selectedBox);

  // Show modal
  const visual = document.getElementById('modalVisual');
  if (prize.img) {
    visual.innerHTML = `<img class="modal-prize-img" src="${prize.img}">`;
  } else {
    visual.innerHTML = `<span class="modal-emoji">🎁</span>`;
  }
  document.getElementById('modalPrizeName').textContent = prize.name;
  document.getElementById('modalBoxNum').textContent = `Ящик #${selectedBox + 1}`;
  document.getElementById('modalOverlay').classList.add('show');

  launchConfetti();

  selectedBox = null;
  document.getElementById('spinBtn').disabled = true;
  renderBoxes();
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('show');
}

function launchConfetti() {
  const colors = ['#a855f7','#c084fc','#f59e0b','#ffffff','#7c3aed','#e9d5ff'];
  for (let i = 0; i < 60; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      el.style.left = Math.random() * 100 + 'vw';
      el.style.top = '-10px';
      el.style.background = colors[Math.floor(Math.random() * colors.length)];
      el.style.transform = `rotate(${Math.random() * 360}deg)`;
      el.style.width = (6 + Math.random() * 8) + 'px';
      el.style.height = (6 + Math.random() * 8) + 'px';
      document.body.appendChild(el);

      const duration = 1500 + Math.random() * 1000;
      el.animate([
        { top: '-10px', opacity: 1, transform: `rotate(0deg) translateX(0)` },
        { top: '110vh', opacity: 0, transform: `rotate(${360 + Math.random()*360}deg) translateX(${(Math.random()-0.5)*200}px)` }
      ], { duration, easing: 'cubic-bezier(0.25,0.46,0.45,0.94)' }).onfinish = () => el.remove();
    }, i * 30);
  }
}

// Prize editor
function renderPrizes() {
  const list = document.getElementById('prizesList');
  list.innerHTML = '';
  prizes.forEach((prize, idx) => {
    const row = document.createElement('div');
    row.className = 'prize-row';
    row.innerHTML = `
      <div class="prize-num-badge">${idx + 1}</div>
      <input class="prize-input" type="text" value="${prize.name}" placeholder="Название приза..." oninput="prizes[${idx}].name = this.value; renderBoxes()">
      <label class="img-btn ${prize.img ? 'has-img' : ''}" title="Добавить фото">
        ${prize.img ? `<img src="${prize.img}">` : '📷'}
        <input type="file" accept="image/*" onchange="handleImg(event, ${idx})">
      </label>
      <button class="del-btn" onclick="removePrize(${idx})" title="Удалить">✕</button>
    `;
    list.appendChild(row);
  });
}

function handleImg(event, idx) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    prizes[idx].img = e.target.result;
    renderPrizes();
    renderBoxes();
  };
  reader.readAsDataURL(file);
}

function addPrize() {
  prizes.push({ name: 'Новый приз', img: null });
  renderPrizes();
  renderBoxes();
}

function removePrize(idx) {
  if (prizes.length <= 1) return;
  prizes.splice(idx, 1);
  renderPrizes();
  renderBoxes();
}

// Init
document.getElementById('spinBtn').disabled = true;
renderBoxes();
renderPrizes();

// Close modal on overlay click
document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
</script>
</body>
</html>
