<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ЯЩИК ПАНДОРЫ — КЕША РОЗЫГРЫШ</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --purple-deep: #1a0a2e;
    --purple-mid: #2d1557;
    --purple-bright: #7c3aed;
    --purple-glow: #a855f7;
    --purple-light: #c084fc;
    --purple-pale: #e9d5ff;
    --gold: #f59e0b;
    --white: #ffffff;
    --glass-bg: rgba(45, 21, 87, 0.6);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--purple-deep);
    font-family: 'Inter', sans-serif;
    overflow-x: hidden;
    min-height: 100vh;
  }

  /* Animated background */
  .bg-orbs {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
  }
  .orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.3;
    animation: floatOrb 8s ease-in-out infinite;
  }
  .orb1 { width: 400px; height: 400px; background: var(--purple-bright); top: -100px; left: -100px; animation-delay: 0s; }
  .orb2 { width: 300px; height: 300px; background: var(--purple-glow); bottom: -50px; right: -50px; animation-delay: -3s; }
  .orb3 { width: 200px; height: 200px; background: #9333ea; top: 50%; left: 50%; transform: translate(-50%,-50%); animation-delay: -5s; }

  @keyframes floatOrb {
    0%, 100% { transform: translate(0,0) scale(1); }
    33% { transform: translate(30px, -20px) scale(1.05); }
    66% { transform: translate(-20px, 15px) scale(0.95); }
  }

  .container { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 30px 20px 60px; }

  /* Header */
  .header { text-align: center; margin-bottom: 40px; }
  .badge {
    display: inline-block;
    background: linear-gradient(135deg, var(--purple-bright), var(--purple-glow));
    color: white;
    font-family: 'Unbounded', sans-serif;
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    padding: 8px 20px;
    border-radius: 100px;
    margin-bottom: 24px;
    box-shadow: 0 0 20px rgba(168,85,247,0.5);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 20px rgba(168,85,247,0.5); }
    50% { box-shadow: 0 0 40px rgba(168,85,247,0.9); }
  }

  h1 {
    font-family: 'Unbounded', sans-serif;
    font-size: clamp(36px, 8vw, 72px);
    font-weight: 900;
    color: var(--white);
    line-height: 1.05;
    margin-bottom: 16px;
  }
  h1 span {
    background: linear-gradient(135deg, var(--purple-light), var(--purple-glow), var(--gold));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    color: var(--purple-pale);
    font-size: 16px;
    font-weight: 300;
    opacity: 0.7;
  }

  /* Boxes Grid */
  .boxes-section { margin-bottom: 30px; }
  .boxes-label {
    font-family: 'Unbounded', sans-serif;
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--purple-light);
    text-align: center;
    margin-bottom: 20px;
    opacity: 0.7;
  }

  .boxes-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 14px;
    margin-bottom: 12px;
  }

  .box {
    aspect-ratio: 1;
    border-radius: 20px;
    background: linear-gradient(145deg, var(--purple-mid), #1e0b3a);
    border: 1.5px solid rgba(168,85,247,0.3);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column;
    gap: 6px;
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    position: relative;
    overflow: hidden;
    backdrop-filter: blur(2px);
  }
  .box::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(168,85,247,0.2), transparent);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .box:hover { transform: translateY(-4px) scale(1.03); border-color: var(--purple-glow); box-shadow: 0 8px 30px rgba(168,85,247,0.5); }
  .box:hover::before { opacity: 1; }
  .box:hover .box-icon { transform: scale(1.1) rotate(-5deg); }
  .box.selected {
    background: linear-gradient(145deg, var(--purple-bright), #5b21b6);
    border-color: var(--purple-glow);
    box-shadow: 0 0 30px rgba(168,85,247,0.7), inset 0 0 20px rgba(255,255,255,0.1);
    transform: translateY(-4px) scale(1.05);
    animation: selectedPulse 1.5s ease-in-out infinite;
  }
  @keyframes selectedPulse {
    0%, 100% { box-shadow: 0 0 30px rgba(168,85,247,0.7), inset 0 0 20px rgba(255,255,255,0.05); }
    50% { box-shadow: 0 0 50px rgba(168,85,247,1), inset 0 0 20px rgba(255,255,255,0.15); }
  }
  .box.opened {
    cursor: default;
    transform: none !important;
    background: linear-gradient(145deg, #1f0e3f, #15072e);
    border-color: rgba(168,85,247,0.2);
  }
  .box.opened .box-icon { display: none; }

  .box-icon { font-size: 32px; transition: transform 0.3s; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3)); }
  .box-num {
    font-family: 'Unbounded', sans-serif;
    font-size: 9px;
    color: rgba(255,255,255,0.4);
    letter-spacing: 1px;
  }
  .box.selected .box-num { color: rgba(255,255,255,0.9); }

  .prize-inside {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    width: 100%; height: 100%;
    padding: 8px;
  }
  .box.opened .prize-inside { display: flex; }
  .prize-img-wrap {
    width: 50px; height: 50px;
    border-radius: 12px;
    overflow: hidden;
    background: rgba(255,255,255,0.08);
    display: flex; align-items: center; justify-content: center;
    font-size: 26px;
  }
  .prize-img-wrap img { width: 100%; height: 100%; object-fit: cover; border-radius: 12px; }
  .prize-name-small {
    font-family: 'Unbounded', sans-serif;
    font-size: 7px;
    color: #e0c3ff;
    text-align: center;
    line-height: 1.3;
    font-weight: 500;
  }

  /* PREVIEW панель (увеличенное изображение) */
  .preview-panel {
    background: linear-gradient(135deg, rgba(45, 21, 87, 0.8), rgba(26, 10, 46, 0.9));
    backdrop-filter: blur(12px);
    border-radius: 32px;
    border: 1px solid rgba(168,85,247,0.3);
    padding: 20px 24px;
    margin: 20px 0 30px;
    display: flex;
    align-items: center;
    gap: 24px;
    transition: all 0.3s;
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
  }
  .preview-img-block {
    width: 90px;
    height: 90px;
    background: rgba(0,0,0,0.4);
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    border: 2px solid var(--purple-glow);
    box-shadow: 0 0 15px rgba(168,85,247,0.4);
  }
  .preview-img-block img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .preview-img-block span {
    font-size: 48px;
    filter: drop-shadow(0 0 6px #a855f7);
  }
  .preview-info {
    flex: 1;
  }
  .preview-label {
    font-family: 'Unbounded', sans-serif;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--purple-light);
    text-transform: uppercase;
    opacity: 0.7;
  }
  .preview-name {
    font-family: 'Unbounded', sans-serif;
    font-size: 22px;
    font-weight: 800;
    color: white;
    word-break: break-word;
    margin-top: 6px;
    text-shadow: 0 2px 5px rgba(0,0,0,0.3);
  }
  .preview-hint {
    font-size: 12px;
    color: var(--purple-pale);
    opacity: 0.6;
    margin-top: 8px;
  }
  @media (max-width: 550px) {
    .preview-panel { padding: 14px 18px; gap: 14px; }
    .preview-img-block { width: 65px; height: 65px; }
    .preview-name { font-size: 18px; }
  }

  /* Prize Editor (настраиваемые призы) */
  .prizes-section {
    background: linear-gradient(145deg, var(--purple-mid), #1e0b3a);
    border: 1.5px solid rgba(168,85,247,0.3);
    border-radius: 28px;
    padding: 28px;
    margin-bottom: 30px;
    transition: all 0.4s ease;
  }
  .prizes-section.hidden {
    display: none;
  }
  .section-title {
    font-family: 'Unbounded', sans-serif;
    font-size: 14px;
    color: white;
    margin-bottom: 6px;
  }
  .section-sub {
    font-size: 13px;
    color: var(--purple-pale);
    opacity: 0.5;
    margin-bottom: 22px;
  }

  .prizes-list { display: flex; flex-direction: column; gap: 12px; max-height: 320px; overflow-y: auto; padding-right: 6px; }

  .prize-row {
    display: grid;
    grid-template-columns: 36px 1fr auto auto;
    gap: 10px;
    align-items: center;
  }
  .prize-num-badge {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--purple-bright), var(--purple-glow));
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Unbounded', sans-serif;
    font-size: 12px;
    color: white;
    font-weight: 700;
  }

  .prize-input {
    background: rgba(255,255,255,0.07);
    border: 1.5px solid rgba(168,85,247,0.3);
    border-radius: 14px;
    padding: 10px 14px;
    color: white;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    width: 100%;
    transition: 0.2s;
    outline: none;
  }
  .prize-input:focus { border-color: var(--purple-glow); background: rgba(168,85,247,0.12); }
  .prize-input::placeholder { color: rgba(255,255,255,0.2); }

  .img-btn {
    width: 38px; height: 38px;
    border-radius: 14px;
    border: 1.5px dashed rgba(168,85,247,0.5);
    background: rgba(0,0,0,0.3);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--purple-light);
    font-size: 18px;
    transition: all 0.2s;
    position: relative;
  }
  .img-btn:hover { border-color: var(--purple-glow); background: rgba(168,85,247,0.2); }
  .img-btn.has-img { border-style: solid; border-color: var(--purple-glow); background: rgba(168,85,247,0.2); }
  .img-btn img { width: 100%; height: 100%; object-fit: cover; border-radius: 12px; position: absolute; inset: 0; }
  .img-btn input[type=file] { display: none; }

  .del-btn {
    width: 38px; height: 38px;
    border-radius: 14px;
    border: 1.5px solid rgba(255,100,100,0.3);
    background: transparent;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: rgba(255,120,120,0.6);
    font-size: 18px;
    transition: all 0.2s;
  }
  .del-btn:hover { border-color: rgba(255,100,100,0.9); color: #ff8888; background: rgba(255,100,100,0.1); }

  .add-prize-btn {
    width: 100%;
    padding: 12px;
    border-radius: 16px;
    border: 1.5px dashed rgba(168,85,247,0.4);
    background: transparent;
    color: var(--purple-light);
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    margin-top: 16px;
    transition: all 0.2s;
  }
  .add-prize-btn:hover { border-color: var(--purple-glow); background: rgba(168,85,247,0.1); }

  /* Action buttons */
  .action-group {
    display: flex;
    flex-wrap: wrap;
    gap: 14px;
    margin-bottom: 30px;
    justify-content: center;
  }
  .action-btn {
    background: rgba(45, 21, 87, 0.8);
    backdrop-filter: blur(8px);
    border: 1.5px solid rgba(168,85,247,0.4);
    padding: 12px 24px;
    border-radius: 60px;
    color: white;
    font-family: 'Unbounded', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: 0.2s;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  .action-btn:hover {
    background: var(--purple-bright);
    border-color: var(--purple-glow);
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(124,58,237,0.4);
  }

  .spin-btn {
    display: block;
    width: 100%;
    padding: 18px;
    border-radius: 60px;
    border: none;
    background: linear-gradient(135deg, var(--purple-bright), #9333ea, var(--purple-glow));
    color: white;
    font-family: 'Unbounded', sans-serif;
    font-size: 18px;
    font-weight: 800;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    box-shadow: 0 10px 30px rgba(124,58,237,0.6);
    margin-bottom: 20px;
    text-transform: uppercase;
    position: relative;
    overflow: hidden;
  }
  .spin-btn::before {
    content: '';
    position: absolute;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: linear-gradient(45deg, transparent 30%, rgba(255,255,255,0.15) 50%, transparent 70%);
    transform: rotate(45deg) translateX(-100%);
    transition: transform 0.6s;
  }
  .spin-btn:hover { transform: translateY(-3px) scale(1.01); box-shadow: 0 15px 40px rgba(124,58,237,0.8); }
  .spin-btn:hover::before { transform: rotate(45deg) translateX(100%); }
  .spin-btn:active { transform: scale(0.98); }
  .spin-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(10,0,20,0.9);
    backdrop-filter: blur(12px);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s;
  }
  .modal-overlay.show { opacity: 1; pointer-events: all; }

  .modal {
    background: linear-gradient(145deg, var(--purple-mid), #1a0940);
    border: 1.5px solid rgba(168,85,247,0.5);
    border-radius: 36px;
    padding: 48px 32px;
    max-width: 400px;
    width: 90%;
    text-align: center;
    transform: scale(0.8) translateY(20px);
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    box-shadow: 0 30px 80px rgba(0,0,0,0.6), 0 0 70px rgba(168,85,247,0.4);
  }
  .modal-overlay.show .modal { transform: scale(1) translateY(0); }
  .modal-emoji { font-size: 70px; margin-bottom: 16px; display: block; animation: bounceIn 0.5s 0.2s both; }
  .modal-prize-img { width: 110px; height: 110px; border-radius: 28px; object-fit: cover; margin: 0 auto 16px; border: 3px solid var(--purple-glow); animation: bounceIn 0.5s 0.2s both; }
  @keyframes bounceIn {
    0% { transform: scale(0); opacity: 0; }
    70% { transform: scale(1.1); }
    100% { transform: scale(1); opacity: 1; }
  }
  .modal-label {
    font-family: 'Unbounded', sans-serif;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--purple-light);
    opacity: 0.7;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .modal-prize-name {
    font-family: 'Unbounded', sans-serif;
    font-size: 26px;
    font-weight: 900;
    color: white;
    margin-bottom: 20px;
  }
  .modal-close {
    padding: 14px 36px;
    border-radius: 40px;
    border: none;
    background: linear-gradient(135deg, var(--purple-bright), var(--purple-glow));
    color: white;
    font-family: 'Unbounded', sans-serif;
    font-size: 14px;
    cursor: pointer;
    transition: 0.2s;
  }
  .modal-close:hover { transform: scale(1.05); box-shadow: 0 8px 25px rgba(168,85,247,0.6); }

  .confetti-piece {
    position: fixed;
    width: 10px; height: 10px;
    opacity: 0;
    pointer-events: none;
    z-index: 200;
    border-radius: 2px;
  }
  @media (max-width: 550px) {
    .boxes-grid { gap: 8px; }
    .action-btn { padding: 8px 16px; font-size: 11px; }
  }
</style>
</head>
<body>

<div class="bg-orbs">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
</div>

<div class="container">
  <div class="header">
    <div class="badge">✨ Розыгрыш ОТ КЕШИ</div>
    <h1>ЯЩИК<br><span>ПАНДОРЫ</span></h1>
    <p class="subtitle">Выбери ящик и узнай свой приз</p>
  </div>

  <!-- Boxes -->
  <div class="boxes-section">
    <div class="boxes-label">🗳️ ВЫБЕРИ ОДИН ИЗ 10 ЯЩИКОВ</div>
    <div class="boxes-grid" id="boxesGrid"></div>
  </div>

  <!-- Preview панель (увеличенный приз) -->
  <div class="preview-panel" id="previewPanel">
    <div class="preview-img-block" id="previewImg">
      <span>🎁</span>
    </div>
    <div class="preview-info">
      <div class="preview-label">ВЫБРАННЫЙ ПРИЗ</div>
      <div class="preview-name" id="previewPrizeName">—</div>
      <div class="preview-hint" id="previewHint">Нажми на ящик, чтобы увидеть</div>
    </div>
  </div>

  <!-- Кнопки управления -->
  <div class="action-group">
    <button class="action-btn" id="shuffleBtn">🎲 ПЕРЕМЕШАТЬ КЕЙСЫ</button>
    <button class="action-btn" id="toggleSettingsBtn">⚙️ НАСТРОЙКИ НАГРАД</button>
  </div>

  <!-- Prize editor (настраиваемые призы) -->
  <div class="prizes-section" id="prizesSection">
    <div class="section-title">🎁 РЕДАКТОР ПРИЗОВ</div>
    <div class="section-sub">Меняй названия и загружай изображения (клик на 📷)</div>
    <div class="prizes-list" id="prizesList"></div>
    <button class="add-prize-btn" id="addPrizeBtn">+ Добавить приз</button>
  </div>

  <button class="spin-btn" id="spinBtn">🎲 ОТКРЫТЬ ЯЩИК</button>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div id="modalVisual"></div>
    <div class="modal-label">ТВОЙ ПРИЗ</div>
    <div class="modal-prize-name" id="modalPrizeName">—</div>
    <div class="modal-box-num" id="modalBoxNum"></div>
    <button class="modal-close" onclick="closeModal()">ЗАБРАТЬ! 🎉</button>
  </div>
</div>

<script>
// ------------------- НАЧАЛЬНЫЕ ДАННЫЕ -------------------
let prizes = [
  { name: 'Длор', img: null },
  { name: 'Вой', img: null },
  { name: 'Дилдо', img: null },
  { name: 'Бабочка', img: null },
  { name: 'Керыч', img: null },
  { name: 'Авп фейд', img: null },
  { name: 'Мка поток информации', img: null },
  { name: 'хз че добавить', img: null },
  { name: 'хз', img: null },
  { name: 'кеша топ', img: null },
];

let selectedBox = null;
let openedBoxes = new Set();

// DOM элементы
const boxesGrid = document.getElementById('boxesGrid');
const spinBtn = document.getElementById('spinBtn');
const previewPrizeName = document.getElementById('previewPrizeName');
const previewImgDiv = document.getElementById('previewImg');
const previewHint = document.getElementById('previewHint');

// ------------------- ОТРИСОВКА ЯЩИКОВ -------------------
function renderBoxes() {
  boxesGrid.innerHTML = '';
  for (let i = 0; i < 10; i++) {
    const prizeForBox = prizes[i % prizes.length];
    const box = document.createElement('div');
    box.className = 'box' + (selectedBox === i ? ' selected' : '') + (openedBoxes.has(i) ? ' opened' : '');
    box.dataset.index = i;

    if (openedBoxes.has(i)) {
      box.innerHTML = `
        <div class="prize-inside">
          <div class="prize-img-wrap">
            ${prizeForBox.img ? `<img src="${prizeForBox.img}" alt="prize">` : '🎁'}
          </div>
          <div class="prize-name-small">${escapeHtml(prizeForBox.name)}</div>
        </div>`;
    } else {
      box.innerHTML = `
        <div class="box-icon">📦</div>
        <div class="box-num">#${i + 1}</div>`;
      box.onclick = (function(idx) { return function() { selectBox(idx); }; })(i);
    }
    boxesGrid.appendChild(box);
  }
}

// Выбор ящика + обновление превью
function selectBox(i) {
  if (openedBoxes.has(i)) return;
  selectedBox = (selectedBox === i) ? null : i;
  spinBtn.disabled = (selectedBox === null);
  renderBoxes();
  updatePreviewForSelected();
}

// Показать увеличенное изображение/название выбранного приза
function updatePreviewForSelected() {
  if (selectedBox !== null && !openedBoxes.has(selectedBox)) {
    const prize = prizes[selectedBox % prizes.length];
    previewPrizeName.textContent = prize.name || "Без названия";
    previewHint.textContent = "✨ Этот приз ждёт тебя!";
    if (prize.img) {
      previewImgDiv.innerHTML = `<img src="${prize.img}" alt="preview">`;
    } else {
      previewImgDiv.innerHTML = `<span>🎁</span>`;
    }
  } else {
    previewPrizeName.textContent = "—";
    previewHint.textContent = "Нажми на ящик, чтобы увидеть приз";
    previewImgDiv.innerHTML = `<span>🎁</span>`;
  }
}

// Открытие выбранного ящика
function openSelectedBox() {
  if (selectedBox === null) return;
  const prize = prizes[selectedBox % prizes.length];
  openedBoxes.add(selectedBox);
  
  // Модалка с призом
  const visual = document.getElementById('modalVisual');
  if (prize.img) {
    visual.innerHTML = `<img class="modal-prize-img" src="${prize.img}" alt="prize">`;
  } else {
    visual.innerHTML = `<span class="modal-emoji">🎁</span>`;
  }
  document.getElementById('modalPrizeName').textContent = prize.name;
  document.getElementById('modalBoxNum').innerHTML = `Ящик #${selectedBox + 1}`;
  document.getElementById('modalOverlay').classList.add('show');
  
  launchConfetti();
  
  selectedBox = null;
  spinBtn.disabled = true;
  renderBoxes();
  updatePreviewForSelected();
}

// ------------------- ПЕРЕМЕШИВАНИЕ КЕЙСОВ -------------------
function shufflePrizes() {
  // Перемешиваем массив призов (Fisher-Yates)
  for (let i = prizes.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [prizes[i], prizes[j]] = [prizes[j], prizes[i]];
  }
  // Сбрасываем все открытые ящики и выбранный
  openedBoxes.clear();
  selectedBox = null;
  spinBtn.disabled = true;
  renderBoxes();
  renderPrizesList();  // обновляем редактор
  updatePreviewForSelected();
  // Мини-эффект
  launchMiniConfetti();
}

// Мини конфетти для анимации перемешивания
function launchMiniConfetti() {
  for (let i = 0; i < 30; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      el.style.left = Math.random() * 100 + 'vw';
      el.style.top = '50%';
      el.style.background = ['#a855f7', '#f59e0b', '#c084fc'][Math.floor(Math.random()*3)];
      el.style.width = '6px'; el.style.height = '6px';
      document.body.appendChild(el);
      el.animate([{ opacity: 1, transform: 'translateY(0px)' }, { opacity: 0, transform: `translateY(${Math.random() * 100 - 50}px)` }], { duration: 800 });
      setTimeout(() => el.remove(), 800);
    }, i * 20);
  }
}

// ------------------- НАСТРОЙКИ: СКРЫТЬ/ПОКАЗАТЬ РЕДАКТОР -------------------
function toggleSettings() {
  const section = document.getElementById('prizesSection');
  section.classList.toggle('hidden');
}

// ------------------- РЕДАКТОР ПРИЗОВ -------------------
function renderPrizesList() {
  const list = document.getElementById('prizesList');
  if (!list) return;
  list.innerHTML = '';
  prizes.forEach((prize, idx) => {
    const row = document.createElement('div');
    row.className = 'prize-row';
    row.innerHTML = `
      <div class="prize-num-badge">${idx + 1}</div>
      <input class="prize-input" type="text" value="${escapeHtml(prize.name)}" placeholder="Название приза..." data-idx="${idx}">
      <label class="img-btn ${prize.img ? 'has-img' : ''}" data-idx="${idx}">
        ${prize.img ? `<img src="${prize.img}">` : '📷'}
        <input type="file" accept="image/*" data-idx="${idx}" class="img-file-input">
      </label>
      <button class="del-btn" data-idx="${idx}" title="Удалить">✕</button>
    `;
    list.appendChild(row);
    
    // Обработчик изменения имени
    const input = row.querySelector('.prize-input');
    input.addEventListener('input', (e) => {
      prizes[idx].name = e.target.value;
      renderBoxes();
      if (selectedBox !== null && (selectedBox % prizes.length) === idx) updatePreviewForSelected();
    });
    
    // Загрузка изображения
    const fileInput = row.querySelector('.img-file-input');
    fileInput.addEventListener('change', (e) => handleImgUpload(e, idx));
    
    // Удаление приза
    const delBtn = row.querySelector('.del-btn');
    delBtn.addEventListener('click', () => removePrize(idx));
  });
}

function handleImgUpload(event, idx) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    prizes[idx].img = e.target.result;
    renderPrizesList();
    renderBoxes();
    if (selectedBox !== null && (selectedBox % prizes.length) === idx) updatePreviewForSelected();
  };
  reader.readAsDataURL(file);
}

function addPrize() {
  prizes.push({ name: 'Новый скин', img: null });
  renderPrizesList();
  renderBoxes();
}

function removePrize(idx) {
  if (prizes.length <= 1) return;
  prizes.splice(idx, 1);
  renderPrizesList();
  renderBoxes();
  if (selectedBox !== null) updatePreviewForSelected();
}

// Простая защита от XSS
function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/[&<>]/g, function(m) {
    if (m === '&') return '&amp;';
    if (m === '<') return '&lt;';
    if (m === '>') return '&gt;';
    return m;
  });
}

// ------------------- КОНФЕТТИ -------------------
function launchConfetti() {
  const colors = ['#a855f7','#c084fc','#f59e0b','#ffffff','#7c3aed','#e9d5ff'];
  for (let i = 0; i < 90; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      el.style.left = Math.random() * 100 + 'vw';
      el.style.top = '-10px';
      el.style.background = colors[Math.floor(Math.random() * colors.length)];
      el.style.transform = `rotate(${Math.random() * 360}deg)`;
      el.style.width = (6 + Math.random() * 10) + 'px';
      el.style.height = (6 + Math.random() * 10) + 'px';
      document.body.appendChild(el);
      const duration = 1500 + Math.random() * 1000;
      el.animate([
        { top: '-10px', opacity: 1, transform: `rotate(0deg) translateX(0)` },
        { top: '110vh', opacity: 0, transform: `rotate(${360 + Math.random()*360}deg) translateX(${(Math.random()-0.5)*200}px)` }
      ], { duration, easing: 'cubic-bezier(0.25,0.46,0.45,0.94)' }).onfinish = () => el.remove();
    }, i * 25);
  }
}

// Закрытие модалки
function closeModal() {
  document.getElementById('modalOverlay').classList.remove('show');
}

// ------------------- ИНИЦИАЛИЗАЦИЯ И СОБЫТИЯ -------------------
function init() {
  renderBoxes();
  renderPrizesList();
  spinBtn.disabled = true;
  updatePreviewForSelected();
  
  // Кнопки
  document.getElementById('shuffleBtn').addEventListener('click', shufflePrizes);
  document.getElementById('toggleSettingsBtn').addEventListener('click', toggleSettings);
  document.getElementById('addPrizeBtn').addEventListener('click', addPrize);
  spinBtn.addEventListener('click', openSelectedBox);
  
  // Закрытие модалки по клику на фон
  document.getElementById('modalOverlay').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });
}

init();
</script>
</body>
